<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <!-- Infinity gradient - purple to cyan -->
    <linearGradient id="infinityGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Eye inner glow -->
    <radialGradient id="eyeInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>

    <!-- Bar gradients - rainbow spectrum -->
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <!-- Gold gradient for text -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="barGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer ring - meter gauge -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#2d2d44" stroke-width="4"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#infinityGrad)" stroke-width="4"
          stroke-dasharray="565 1130" stroke-linecap="round"
          transform="rotate(-90 256 256)" filter="url(#glow)" opacity="0.8"/>

  <!-- ===== INFINITY AS WATCHING EYES ===== -->
  <g transform="translate(256, 200)" filter="url(#strongGlow)">
    <!-- Main infinity symbol -->
    <path d="M0,-60
             C-60,-60 -90,-30 -90,15
             C-90,60 -60,75 -30,60
             C0,45 0,15 0,-10
             C0,15 0,45 30,60
             C60,75 90,60 90,15
             C90,-30 60,-60 0,-60"
          fill="none"
          stroke="url(#infinityGrad)"
          stroke-width="12"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Left eye core -->
    <circle cx="-50" cy="0" r="28" fill="url(#eyeInner)" opacity="0.9"/>
    <circle cx="-50" cy="0" r="14" fill="#0f0f1a"/>
    <circle cx="-50" cy="0" r="8" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="-54" cy="-4" r="3" fill="#fff" opacity="0.9"/>

    <!-- Right eye core -->
    <circle cx="50" cy="0" r="28" fill="url(#eyeInner)" opacity="0.9"/>
    <circle cx="50" cy="0" r="14" fill="#0f0f1a"/>
    <circle cx="50" cy="0" r="8" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="46" cy="-4" r="3" fill="#fff" opacity="0.9"/>
  </g>

  <!-- ===== IMPROVED TOKEN BARS ===== -->
  <g transform="translate(76, 320)">
    <!-- Bar backgrounds with rounded tops -->
    <g opacity="0.15">
      <rect x="0"   y="0"  width="56" height="120" rx="8" fill="#fff"/>
      <rect x="76"  y="0"  width="56" height="120" rx="8" fill="#fff"/>
      <rect x="152" y="0"  width="56" height="120" rx="8" fill="#fff"/>
      <rect x="228" y="0"  width="56" height="120" rx="8" fill="#fff"/>
      <rect x="304" y="0"  width="56" height="120" rx="8" fill="#fff"/>
    </g>

    <!-- Filled bars - varied dynamic heights -->
    <g filter="url(#barGlow)">
      <!-- Bar 1 - Purple -->
      <rect x="0"   y="20"  width="56" height="100" rx="8" fill="url(#bar1)"/>
      <rect x="0"   y="20"  width="56" height="4" rx="2" fill="#c4b5fd" opacity="0.8"/>
      <!-- Token count -->
      <text x="28" y="140" font-family="SF Mono, monospace" font-size="11" fill="#a78bfa" text-anchor="middle">42K</text>

      <!-- Bar 2 - Blue -->
      <rect x="76"  y="5"   width="56" height="115" rx="8" fill="url(#bar2)"/>
      <rect x="76"  y="5"   width="56" height="4" rx="2" fill="#93c5fd" opacity="0.8"/>
      <text x="104" y="140" font-family="SF Mono, monospace" font-size="11" fill="#60a5fa" text-anchor="middle">67K</text>

      <!-- Bar 3 - Cyan -->
      <rect x="152" y="35"  width="56" height="85" rx="8" fill="url(#bar3)"/>
      <rect x="152" y="35"  width="56" height="4" rx="2" fill="#67e8f9" opacity="0.8"/>
      <text x="180" y="140" font-family="SF Mono, monospace" font-size="11" fill="#22d3ee" text-anchor="middle">31K</text>

      <!-- Bar 4 - Green -->
      <rect x="228" y="12"  width="56" height="108" rx="8" fill="url(#bar4)"/>
      <rect x="228" y="12"  width="56" height="4" rx="2" fill="#6ee7b7" opacity="0.8"/>
      <text x="256" y="140" font-family="SF Mono, monospace" font-size="11" fill="#34d399" text-anchor="middle">58K</text>

      <!-- Bar 5 - Gold -->
      <rect x="304" y="45"  width="56" height="75" rx="8" fill="url(#bar5)"/>
      <rect x="304" y="45"  width="56" height="4" rx="2" fill="#fde68a" opacity="0.8"/>
      <text x="332" y="140" font-family="SF Mono, monospace" font-size="11" fill="#fbbf24" text-anchor="middle">24K</text>
    </g>

    <!-- Animated pulse lines across bars -->
    <g opacity="0.4">
      <line x1="0" y1="60" x2="360" y2="60" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 8"/>
      <line x1="0" y1="90" x2="360" y2="90" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 8"/>
    </g>
  </g>

  <!-- ===== BRAND TEXT ===== -->
  <g transform="translate(256, 490)" filter="url(#glow)">
    <text font-family="SF Mono, Monaco, monospace" font-size="22" fill="url(#gold)"
          text-anchor="middle" font-weight="600">$ tokmeter</text>
  </g>

  <!-- Corner accent particles -->
  <circle cx="80" cy="80" r="4" fill="#8b5cf6" opacity="0.6" filter="url(#glow)"/>
  <circle cx="432" cy="80" r="4" fill="#06b6d4" opacity="0.6" filter="url(#glow)"/>
  <circle cx="80" cy="432" r="4" fill="#34d399" opacity="0.6" filter="url(#glow)"/>
  <circle cx="432" cy="432" r="4" fill="#fbbf24" opacity="0.6" filter="url(#glow)"/>
</svg>
