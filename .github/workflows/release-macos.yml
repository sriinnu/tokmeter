# ============================================================================
# Release macOS Bar — build, sign, notarize, and upload
# ============================================================================
#
# Requires these secrets for code signing + notarization:
#   APPLE_DEVELOPER_ID_P12        — .p12 cert, base64-encoded
#   APPLE_DEVELOPER_ID_PASSWORD   — password for the .p12
#   APP_STORE_CONNECT_API_KEY_P8  — App Store Connect API key
#   APP_STORE_CONNECT_KEY_ID      — API key ID
#   APP_STORE_CONNECT_ISSUER_ID   — Issuer ID
#   SPARKLE_PRIVATE_KEY           — Ed25519 key for Sparkle auto-updates
#   SPARKLE_PUBLIC_KEY            — Public key embedded in the app
#
# When secrets are missing, the workflow skips signing/notarization
# and produces an unsigned build artifact instead.
# ============================================================================

name: Release macOS Bar

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.2.0)"
        required: true
        default: "0.2.0"

env:
  APP_NAME: TokmeterBar
  BUNDLE_ID: com.sriinnu.tokmeterbar

permissions:
  contents: write

jobs:
  build-sign-notarize:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Building version: ${VERSION}"

      - name: Check signing secrets
        id: check-secrets
        run: |
          if [[ -n "${{ secrets.APPLE_DEVELOPER_ID_P12 }}" ]]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
            echo "✅ Apple signing secrets found"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Apple signing secrets not configured — building unsigned"
          fi

      - name: Import signing certificate
        if: steps.check-secrets.outputs.has_signing == 'true'
        env:
          APPLE_DEVELOPER_ID_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          APPLE_DEVELOPER_ID_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_DEVELOPER_ID_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -P "$APPLE_DEVELOPER_ID_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm -f /tmp/cert.p12

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build release binary
        working-directory: packages/macos-bar
        run: swift build -c release

      - name: Bundle .app (signed)
        if: steps.check-secrets.outputs.has_signing == 'true'
        working-directory: packages/macos-bar
        env:
          DEV_ID: "Developer ID Application: Srinivas Pendela (RSH5FK4MB6)"
          SUPUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
          CFBundleShortVersionString: ${{ env.VERSION }}
          CFBundleVersion: ${{ github.run_number }}
        run: ./bundle.sh --signed --no-install

      - name: Bundle .app (unsigned)
        if: steps.check-secrets.outputs.has_signing != 'true'
        working-directory: packages/macos-bar
        env:
          CFBundleShortVersionString: ${{ env.VERSION }}
          CFBundleVersion: ${{ github.run_number }}
        run: ./bundle.sh --no-install

      - name: Notarize
        if: steps.check-secrets.outputs.has_signing == 'true'
        working-directory: packages/macos-bar
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY_P8" | sed 's/\\n/\n/g' > /tmp/api-key.p8

          /usr/bin/ditto --norsrc -c -k --keepParent ${APP_NAME}.app /tmp/notarize.zip

          xcrun notarytool submit /tmp/notarize.zip \
            --key /tmp/api-key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait

          xcrun stapler staple ${APP_NAME}.app
          spctl -a -t exec -vv ${APP_NAME}.app
          xcrun stapler validate ${APP_NAME}.app

          rm -f /tmp/api-key.p8 /tmp/notarize.zip

      - name: Create distribution zip
        working-directory: packages/macos-bar
        run: |
          xattr -cr ${APP_NAME}.app 2>/dev/null || true
          find ${APP_NAME}.app -name '._*' -delete 2>/dev/null || true
          /usr/bin/ditto --norsrc -c -k --keepParent ${APP_NAME}.app ${APP_NAME}-${VERSION}.zip
          echo "ZIP_PATH=${APP_NAME}-${VERSION}.zip" >> "$GITHUB_ENV"
          echo "ZIP_SIZE=$(stat -f%z ${APP_NAME}-${VERSION}.zip)" >> "$GITHUB_ENV"

      - name: Sign with Sparkle
        if: steps.check-secrets.outputs.has_signing == 'true'
        working-directory: packages/macos-bar
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle.key
          chmod 600 /tmp/sparkle.key

          SIGN_TOOL=$(find .build -name "sign_update" -type f -perm +111 2>/dev/null | head -1)
          if [[ -z "$SIGN_TOOL" ]]; then
            echo "WARNING: sign_update not found, skipping Sparkle signing"
          else
            ED_SIG=$("$SIGN_TOOL" -f /tmp/sparkle.key "${APP_NAME}-${VERSION}.zip")
            echo "Sparkle signature: ${ED_SIG}"
            echo "ED_SIG=${ED_SIG}" >> "$GITHUB_ENV"
          fi
          rm -f /tmp/sparkle.key

      - name: Upload to Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: packages/macos-bar
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${APP_NAME}-${VERSION}.zip" \
            --clobber

      # Sparkle resolves new versions from packages/macos-bar/appcast.xml served
      # from raw.githubusercontent.com/main. Auto-append a new <item> on real
      # release events so existing users see the update on next poll. Skipped
      # for workflow_dispatch (manual rebuilds shouldn't bump appcast).
      - name: Update appcast.xml
        if: github.event_name == 'release' && steps.check-secrets.outputs.has_signing == 'true' && env.ED_SIG != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          export BUILD_NUM="${{ github.run_number }}"
          export TAG="${{ github.event.release.tag_name }}"
          export ZIP_NAME="${APP_NAME}-${VERSION}.zip"
          export ZIP_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ZIP_NAME}"
          # ED_SIG already contains sparkle:edSignature="…" length="…" as one
          # attribute string, ready to drop into the enclosure tag.

          git fetch origin main
          git checkout -B main origin/main

          python3 - <<'PY'
          import os, re, pathlib
          path = pathlib.Path("packages/macos-bar/appcast.xml")
          xml = path.read_text()
          version    = os.environ["VERSION"]
          build_num  = os.environ["BUILD_NUM"]
          pub_date   = os.environ["PUB_DATE"]
          zip_url    = os.environ["ZIP_URL"]
          ed_sig     = os.environ["ED_SIG"]
          tag        = os.environ["TAG"]
          repo       = os.environ["GITHUB_REPOSITORY"]

          # Idempotency — skip if this version is already in the feed.
          if f"<sparkle:shortVersionString>{version}</sparkle:shortVersionString>" in xml:
              print(f"appcast.xml already has {version}, skipping insert")
              raise SystemExit(0)

          item = (
              "        <item>\n"
              f"            <title>TokmeterBar {version}</title>\n"
              f"            <pubDate>{pub_date}</pubDate>\n"
              f"            <sparkle:version>{build_num}</sparkle:version>\n"
              f"            <sparkle:shortVersionString>{version}</sparkle:shortVersionString>\n"
              "            <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>\n"
              f"            <description>&lt;p&gt;See release notes at &lt;a href=\"https://github.com/{repo}/releases/tag/{tag}\"&gt;{tag}&lt;/a&gt;.&lt;/p&gt;</description>\n"
              f'            <enclosure url="{zip_url}" type="application/octet-stream" {ed_sig} />\n'
              "        </item>\n"
          )

          # Insert directly after <language>…</language> (top of channel).
          new_xml, n = re.subn(
              r"(<language>[^<]*</language>\n)",
              r"\1" + item,
              xml,
              count=1,
          )
          if n != 1:
              raise SystemExit("ERROR: could not locate <language> anchor in appcast.xml")
          path.write_text(new_xml)
          print(f"Inserted {version} (build {build_num}) into appcast.xml")
          PY

          if git diff --quiet packages/macos-bar/appcast.xml; then
            echo "appcast.xml unchanged — already current"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/macos-bar/appcast.xml
          git commit -m "chore(appcast): add ${TAG} (build ${BUILD_NUM}) [skip ci]"
          git push origin main

      - name: Upload artifact (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: TokmeterBar-${{ env.VERSION }}
          path: packages/macos-bar/TokmeterBar-${{ env.VERSION }}.zip
