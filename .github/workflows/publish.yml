# ============================================================================
# Publish monorepo packages to npm with provenance on Release
# ============================================================================
#
# Adapted from the standalone workflow used in runic, kosha-discovery, etc.
# Extended for bun monorepo with multiple publishable packages.
#
# NPM_TOKEN SETUP (one-time):
#   1. https://www.npmjs.com/settings/<user>/tokens → Granular Access Token
#   2. Type: Automation, Scope: Read and write, select target packages
#   3. Repo Settings > Secrets > Actions → NPM_TOKEN = <token>
#
# To publish: bump versions → commit → create GitHub Release → workflow runs.
# ============================================================================

name: Release & Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Job 1: Verify — build, lint, and test must pass before publishing
  # ==========================================================================
  verify:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

  # ==========================================================================
  # Job 2: Publish — only after verify succeeds
  # ==========================================================================
  publish:
    name: Publish to npm (with provenance)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish @sriinnu/tokmeter
        run: cd packages/tokmeter && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @sriinnu/drishti
        run: cd packages/mcp && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
