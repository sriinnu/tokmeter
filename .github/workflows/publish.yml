# ============================================================================
# Publish monorepo packages to npm with provenance on Release
# ============================================================================
#
# Adapted from the standalone workflow used in runic, kosha-discovery, etc.
# Extended for bun monorepo with multiple publishable packages.
#
# NPM_TOKEN SETUP (one-time):
#   1. https://www.npmjs.com/settings/<user>/tokens → Granular Access Token
#   2. Type: Automation, Scope: Read and write, select target packages
#   3. Repo Settings > Secrets > Actions → NPM_TOKEN = <token>
#
# To publish: bump versions → commit → create GitHub Release → workflow runs.
# ============================================================================

name: Release & Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Job 1: Verify — build, lint, and test must pass before publishing
  # ==========================================================================
  verify:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

  # ==========================================================================
  # Job 2: Publish — only after verify succeeds
  # ==========================================================================
  publish:
    name: Publish to npm (with provenance)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish @sriinnu/tokmeter-core
        run: cd packages/core && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @sriinnu/tokmeter-cli
        run: cd packages/cli && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @sriinnu/tokmeter-tui
        run: cd packages/tui && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @sriinnu/drishti
        run: cd packages/mcp && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
