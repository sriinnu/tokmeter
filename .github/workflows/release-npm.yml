name: Manual Release (Tag + npm)

# Mirrors kosha-discovery's release workflow shape so the two repos behave
# the same way:
#   1. Bump versions in package.json files (locally).
#   2. Commit + sign tag (e.g. v1.0.0).
#   3. Push tag.
#   4. Trigger this workflow with the tag as input. CI builds, tests,
#      validates each package version matches the tag, and publishes all
#      6 publishable packages to npm in dependency order.
#
# The 6 publishable packages, in dependency order:
#   1. @sriinnu/tokmeter-core   (no internal deps)
#   2. @sriinnu/tokmeter-tui    (depends on core)
#   3. @sriinnu/tokmeter-cli    (depends on core)
#   4. @sriinnu/tokmeter-web    (no internal deps that publish)
#   5. @sriinnu/drishti         (depends on core)
#   6. @sriinnu/tokmeter        (top-level — bundles core+cli+tui)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Signed git tag to release (example: v1.0.0)"
        required: true
        type: string
      publish_npm:
        description: "Publish all packages to npm"
        required: false
        default: true
        type: boolean
      create_github_release:
        description: "Create/update GitHub Release for this tag"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}
          fetch-depth: 0

      - name: Ensure tag exists and is reachable
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse "${{ github.event.inputs.tag }}^{tag}" >/dev/null

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate tag matches every package version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          VERSION_FROM_TAG="${TAG#v}"
          for f in packages/core/package.json \
                   packages/cli/package.json \
                   packages/tui/package.json \
                   packages/web/package.json \
                   packages/mcp/package.json \
                   packages/tokmeter/package.json; do
            v="$(node -p "JSON.parse(require('fs').readFileSync('$f','utf8')).version")"
            if [[ "$VERSION_FROM_TAG" != "$v" ]]; then
              echo "Tag version ($VERSION_FROM_TAG) does not match $f version ($v)."
              exit 1
            fi
          done

      - name: Build all packages
        run: bun run build

      - name: Test
        run: bun run test

      - name: Lint
        run: bun run lint

      - name: Publish @sriinnu/tokmeter-core
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/core
        run: npm publish --access public

      - name: Publish @sriinnu/tokmeter-tui
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/tui
        run: npm publish --access public

      - name: Publish @sriinnu/tokmeter-cli
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/cli
        run: npm publish --access public

      - name: Publish @sriinnu/tokmeter-web
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/web
        run: npm publish --access public

      - name: Publish @sriinnu/drishti
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/mcp
        run: npm publish --access public

      - name: Publish @sriinnu/tokmeter
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/tokmeter
        run: npm publish --access public

      - name: Create GitHub release
        if: ${{ github.event.inputs.create_github_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          generate_release_notes: true
